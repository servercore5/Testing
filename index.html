<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTC secure wallet</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f7; transition:0.3s;}
.dark { background:#121212; color:white;}

header, footer {
  background:#0a3d91;
  color:white;
  padding:15px;
}

.container { padding:20px; }

.box {
  background:white;
  padding:20px;
  border-radius:10px;
  margin:15px 0;
}

.dark .box { background:#1e1e1e; }

button {
  padding:10px;
  margin-top:10px;
  background:#0a3d91;
  color:white;
  border:none;
  cursor:pointer;
}

/* CARD */
.card { width:300px; height:180px; perspective:1000px; }
.card-inner { width:100%; height:100%; transition:0.6s; transform-style:preserve-3d; }
.card:hover .card-inner { transform:rotateY(180deg); }
.card-front, .card-back {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden; border-radius:10px;
  padding:20px; color:white;
}
.card-front { background:#0a3d91; }
.card-back { background:#222; transform:rotateY(180deg); }

/* TRANSACTIONS */
.tx-container { margin-top:15px; border-top:1px solid #ddd; }
.tx-item {
  display:flex; justify-content:space-between;
  padding:12px; border-bottom:1px solid #eee;
  cursor:pointer;
}
.tx-item:hover { background:#f0f5ff; }

.tx-title { font-weight:bold; }
.tx-date { font-size:12px; color:gray; }
.tx-right { font-weight:bold; color:green; }

/* POPUP */
#popup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  display:none;
}

/* SATELLITE */
#satellite {
  position:fixed;
  top:50%;
  left:-50px;
  animation:fly 10s linear infinite;
}
@keyframes fly { from{left:-50px;} to{left:110%;} }
</style>
</head>

<body>

<header>Federal Trade Commission</header>

<div id="satellite">🛰️💷</div>

<div class="container">

<div class="card">
  <div class="card-inner">
    <div class="card-front">
      💳 Premium Card<br><br>
      1200 3478 6766 7776
    </div>
    <div class="card-back">
      CVV: 987<br>Exp: 12/28
    </div>
  </div>
</div>

<div class="box" onclick="showBalance()">
  Account: 13007677876609
  <h2 id="balance">$51,000.00</h2>
</div>

<!-- TRANSACTIONS -->
<div class="box">
  <button onclick="toggleTx()">View Transactions</button>

  <div id="txControls" style="display:none;">
    <select id="filter" onchange="filterTx()">
      <option value="all">All</option>
      <option value="7">Last 7 Days</option>
      <option value="30">Last 30 Days</option>
    </select>

    <input id="search" placeholder="Search..." onkeyup="searchTx()">
    <button onclick="downloadTx()">📥 Download</button>
  </div>

  <div id="tx" class="tx-container" style="display:none;">

    <div class="tx-item" onclick="verifyTx()" data-date="2026-04-12">
      <div>
        <div class="tx-title">Cash Deposit</div>
        <div class="tx-date">12-04-2026 • 04:59 PM</div>
      </div>
      <div class="tx-right">+$50,000</div>
    </div>

    <div class="tx-item" onclick="verifyTx()" data-date="2026-04-11">
      <div>
        <div class="tx-title">Case Compensation</div>
        <div class="tx-date">11-04-2026 • 08:34 AM</div>
      </div>
      <div class="tx-right">+$250</div>
    </div>

  </div>
</div>

<div class="box">
  <canvas id="chart"></canvas>
</div>

</div>

<!-- POPUP -->
<div id="popup">
  <h3>Transaction Verified ✔</h3>
  <button onclick="closePop()">Close</button>
</div>

<script>

function toggleTx(){
  let t=tx.style.display==="none";
  tx.style.display=t?"block":"none";
  txControls.style.display=t?"block":"none";
}

/* FILTER */
function filterTx(){
  let val=filter.value;
  let items=document.querySelectorAll(".tx-item");
  let today=new Date();

  items.forEach(i=>{
    let d=new Date(i.dataset.date);
    let diff=(today-d)/(1000*60*60*24);
    i.style.display=(val==="all" || diff<=val)?"flex":"none";
  });
}

/* SEARCH */
function searchTx(){
  let v=search.value.toLowerCase();
  document.querySelectorAll(".tx-item").forEach(i=>{
    i.style.display=i.innerText.toLowerCase().includes(v)?"flex":"none";
  });
}

/* DOWNLOAD */
function downloadTx(){
  let text="STATEMENT\n\n";
  document.querySelectorAll(".tx-item").forEach(i=>{
    text+=i.innerText+"\n";
  });

  let blob=new Blob([text]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="statement.txt";
  a.click();
}

/* POPUP */
function verifyTx(){
  popup.style.display="block";
}
function closePop(){
  popup.style.display="none";
}

/* BALANCE */
function showBalance(){
  let el=document.getElementById("balance");
  let v=0;
  let i=setInterval(()=>{
    v+=25;
    el.innerHTML="£"+v;
    if(v>=750) clearInterval(i);
  },50);
}

/* CHART */
new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:["Jan","Feb","Mar"],datasets:[{data:[100,300,750]}]}
});

</script>

</body>
</html>
