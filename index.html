<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Bullion</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  background:gold;
  color:black;
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.container {
  max-width:400px;
  margin:50px auto;
  background:#1e293b;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(255,215,0,0.4);
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:12px;
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.success {
  text-align:center;
  margin-top:15px;
  color:lightgreen;
  display:none;
}
</style>
</head>

<body>

<header>JM Bullion - Gold Order</header>

<div class="container">

<form id="orderForm">

<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<input type="email" id="email" placeholder="Email ID" required>

<select id="gold">
<option value="">Select Gold</option>
<option>1 Gram</option>
<option>10 Gram</option>
<option>50 Gram</option>
<option>100 Gram</option>
</select>

<button type="submit">Order Now</button>

</form>

<div class="success" id="successMsg">
Our team would contact you within 4-8 hours.
</div>

</div>

<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY"); // yaha apni key daal
})();

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  let params = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    gold: document.getElementById("gold").value
  };

  emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", params)
  .then(function(res){
    document.getElementById("successMsg").style.display = "block";
    document.getElementById("orderForm").reset();
  })
  .catch(function(err){
    alert("Error sending order");
  });

});
</script>

</body>
</html>
